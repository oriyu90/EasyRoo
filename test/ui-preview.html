<!doctype html>
<!-- 画面確認用のプレビュー。Electron を起動せずに、実物の app.js / app.css を

<html lang="ja">

    <script src="../src/renderer/theme-boot.js"></script>
    <link rel="stylesheet" href="../src/renderer/tokens.css" />

      <nav id="sidebar">

        <button class="nav-item" data-view="routines"><span class="nav-icon">▤</span><span data-i18n="nav.routines"></span></button>
        <button class="nav-item" data-view="runs"><span class="nav-icon">≡</span><span data-i18n="nav.runs"></span></button>
        <button class="nav-item" data-view="stats"><span class="nav-icon">◫</span><span data-i18n="stats.title"></span></button>
        <button class="nav-item" data-view="mcp"><span class="nav-icon">⊞</span><span data-i18n="nav.mcp"></span></button>
        <button class="nav-item" data-view="settings"><span class="nav-icon">⚙</span><span data-i18n="nav.settings"></span></button>
        <div class="rail-foot">
          <div>
            <p class="seg-label" id="lang-label" data-i18n="nav.language"></p>
            <div class="seg" role="group" aria-labelledby="lang-label">
              <button class="seg-btn" data-lang-choice="system" aria-pressed="false" data-i18n="nav.theme.system"></button>
              <button class="seg-btn" data-lang-choice="ja" aria-pressed="false">日本語</button>
              <button class="seg-btn" data-lang-choice="en" aria-pressed="false">English</button>
            </div>
          </div>
          <div>
            <p class="seg-label" id="theme-label" data-i18n="nav.appearance"></p>
            <div class="seg" role="group" aria-labelledby="theme-label">
              <button class="seg-btn" data-theme-choice="system" aria-pressed="false" data-i18n="nav.theme.system"></button>
              <button class="seg-btn" data-theme-choice="light" aria-pressed="false" data-i18n="nav.theme.light"></button>
              <button class="seg-btn" data-theme-choice="dark" aria-pressed="false" data-i18n="nav.theme.dark"></button>
            </div>
          </div>
          <div id="status-chip" class="status-chip"><span id="status-dot" class="dot"></span><span id="status-text" data-i18n="status.starting"></span></div>
          <button id="btn-emergency" class="btn btn-danger btn-block" data-i18n="nav.emergencyStop"></button>
          <p class="hint" data-i18n="nav.emergencyHint"></p>
        </div>
      </nav>
      <main id="main"><div id="view"></div></main>
    </div>
    <div id="toasts"></div>
    <div id="modal-backdrop" class="hidden">
      <div id="modal">

        <div id="modal-body"></div>

    <script>
      // app.js の boot() がハンドラを登録した後に切り替える
      document.addEventListener('DOMContentLoaded', () => {
        const v = location.hash.slice(1);
        if (v) document.querySelector(`.nav-item[data-view="${v}"]`)?.click();

</html>
